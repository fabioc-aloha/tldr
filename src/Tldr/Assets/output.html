<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;" />
<style>
  :root {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --accent: #60cdff;
    --border: #333;
    --code-bg: #2d2d2d;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --fg: #1f1f1f;
      --accent: #005fb8;
      --border: #e0e0e0;
      --code-bg: #f5f5f5;
    }
  }
  [data-theme="dark"] {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --accent: #60cdff;
    --border: #333;
    --code-bg: #2d2d2d;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --fg: #1f1f1f;
    --accent: #005fb8;
    --border: #e0e0e0;
    --code-bg: #f5f5f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.72;
    letter-spacing: 0.01em;
    color: var(--fg);
    background: var(--bg);
    padding: 22px 24px 28px;
    overflow-y: auto;
  }
  h1, h2, h3 { margin: 0 0 10px; font-weight: 650; letter-spacing: -0.02em; }
  h1 { font-size: 24px; margin-top: 4px; }
  h2 { font-size: 19px; margin-top: 20px; }
  h3 { font-size: 16px; margin-top: 16px; }
  p { margin: 0 0 14px; }
  ul, ol { margin: 0 0 14px; padding-left: 22px; }
  li { margin-bottom: 6px; }
  table { border-collapse: collapse; width: 100%; margin: 0 0 16px; border-radius: 10px; overflow: hidden; }
  th, td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
  th { font-weight: 600; background: var(--code-bg); }
  code { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; background: var(--code-bg); padding: 2px 4px; border-radius: 3px; }
  pre { background: var(--code-bg); padding: 14px; border-radius: 10px; overflow-x: auto; margin: 0 0 16px; }
  pre code { background: none; padding: 0; }
  strong { font-weight: 600; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  blockquote { border-left: 3px solid var(--accent); padding: 6px 0 6px 14px; margin: 0 0 16px; opacity: 0.88; background: color-mix(in srgb, var(--code-bg) 38%, transparent); border-radius: 0 10px 10px 0; }
  hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
  .ai-disclosure { margin-top: 28px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--fg); opacity: 0.5; }
  .highlight { background: rgba(96, 205, 255, 0.25); border-left: 3px solid var(--accent); padding-left: 4px; border-radius: 2px; transition: background 0.2s; }
  [data-theme="light"] .highlight { background: rgba(0, 95, 184, 0.12); }
  #content { min-height: 100px; max-width: 76ch; margin: 0 auto; }
</style>
</head>
<body role="document" aria-label="AI-generated summary">
  <div id="content" role="article"></div>
  <div id="ai-disclosure" class="ai-disclosure" style="display:none;">AI-generated summary. May not fully represent the source material. Verify important details against the original document.</div>
  <script>
    // Allowlist-based HTML sanitizer: only permitted tags and safe attributes survive.
    // This is defense-in-depth — CSP blocks inline scripts, and this strips anything unexpected.
    var ALLOWED_TAGS = new Set(['p','br','strong','b','em','i','u','s','del','h1','h2','h3','h4','h5','h6',
      'ul','ol','li','table','thead','tbody','tr','th','td','blockquote','pre','code','hr','a','span','div','sup','sub','dd','dt','dl']);
    var ALLOWED_ATTRS = new Set(['class','id','href','colspan','rowspan','data-sentence']);

    function sanitizeHtml(html) {
      var doc = new DOMParser().parseFromString(html, 'text/html');
      function walk(node) {
        var child = node.firstChild;
        while (child) {
          var next = child.nextSibling;
          if (child.nodeType === 1) { // Element
            var tag = child.tagName.toLowerCase();
            if (!ALLOWED_TAGS.has(tag)) {
              // Replace disallowed element with its text content
              var text = document.createTextNode(child.textContent || '');
              node.replaceChild(text, child);
            } else {
              // Strip disallowed attributes
              var attrs = Array.from(child.attributes);
              for (var i = 0; i < attrs.length; i++) {
                var name = attrs[i].name.toLowerCase();
                if (!ALLOWED_ATTRS.has(name)) {
                  child.removeAttribute(attrs[i].name);
                } else if (name === 'href') {
                  // Only allow http(s) and anchor links
                  var val = child.getAttribute('href') || '';
                  if (!/^(https?:\/\/|#)/i.test(val.trim())) {
                    child.setAttribute('href', '#');
                  }
                }
              }
              walk(child);
            }
          }
          child = next;
        }
      }
      walk(doc.body);
      return doc.body.innerHTML;
    }

    function setContent(html) {
      document.getElementById('content').innerHTML = sanitizeHtml(html);
      document.getElementById('ai-disclosure').style.display = 'block';
    }
    function setTheme(mode) {
      const root = document.documentElement;
      root.removeAttribute('data-theme');
      if (mode === 'dark' || mode === 'light') {
        root.setAttribute('data-theme', mode);
      }
    }
    function highlightSentence(n) {
      n = parseInt(n, 10); if (isNaN(n)) return;
      clearHighlight();
      const el = document.querySelector('[data-sentence="' + n + '"]');
      if (el) { el.classList.add('highlight'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    }

    function clearHighlight() {
      document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
    }
  </script>
</body>
</html>
