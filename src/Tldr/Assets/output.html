<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --accent: #60cdff;
    --border: #333;
    --code-bg: #2d2d2d;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --fg: #1f1f1f;
      --accent: #005fb8;
      --border: #e0e0e0;
      --code-bg: #f5f5f5;
    }
  }
  [data-theme="dark"] {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --accent: #60cdff;
    --border: #333;
    --code-bg: #2d2d2d;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --fg: #1f1f1f;
    --accent: #005fb8;
    --border: #e0e0e0;
    --code-bg: #f5f5f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--fg);
    background: var(--bg);
    padding: 16px;
  }
  h1, h2, h3 { margin: 16px 0 8px; font-weight: 600; }
  h1 { font-size: 20px; }
  h2 { font-size: 17px; }
  h3 { font-size: 15px; }
  p { margin: 0 0 12px; }
  ul, ol { margin: 0 0 12px; padding-left: 24px; }
  li { margin-bottom: 4px; }
  table { border-collapse: collapse; width: 100%; margin: 0 0 12px; }
  th, td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  th { font-weight: 600; background: var(--code-bg); }
  code { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; background: var(--code-bg); padding: 2px 4px; border-radius: 3px; }
  pre { background: var(--code-bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 0 0 12px; }
  pre code { background: none; padding: 0; }
  strong { font-weight: 600; }
  blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 0 0 12px; opacity: 0.85; }
  .highlight { background: rgba(96, 205, 255, 0.2); border-radius: 2px; transition: background 0.2s; }
  #content { min-height: 100px; }
</style>
</head>
<body>
  <div id="content"></div>
  <script>
    function setContent(html) {
      document.getElementById('content').innerHTML = html;
    }
    function setTheme(mode) {
      const root = document.documentElement;
      root.removeAttribute('data-theme');
      if (mode === 'dark' || mode === 'light') {
        root.setAttribute('data-theme', mode);
      }
    }
    function highlightSentence(n) {
      clearHighlight();
      const el = document.querySelector(`[data-sentence="${n}"]`);
      if (el) { el.classList.add('highlight'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    }
    function clearHighlight() {
      document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
    }
  </script>
</body>
</html>
