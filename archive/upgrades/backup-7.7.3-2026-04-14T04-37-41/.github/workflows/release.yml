name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Publish
              run: >
                  dotnet publish src/Tldr/Tldr.csproj
                  -c Release
                  -r win-x64
                  --self-contained
                  -p:PublishSingleFile=true
                  -o publish

            - name: Package
              run: Compress-Archive -Path publish/* -DestinationPath TLDR-${{ github.ref_name }}-win-x64.zip

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: TLDR-${{ github.ref_name }}-win-x64.zip
